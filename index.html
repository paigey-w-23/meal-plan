<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Meal Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F7F4EF;
    --parchment: #EDE8DF;
    --ink: #1C1A16;
    --ink-soft: #4A4640;
    --ink-muted: #8C887F;
    --accent: #2D6A4F;
    --accent-light: #D8EDE4;
    --accent-mid: #52976E;
    --warm: #C4703A;
    --warm-light: #F5E6D8;
    --blue: #2C5282;
    --blue-light: #DAE6F5;
    --border: #D8D3C8;
    --white: #FDFCFA;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* NAV */
  nav {
    background: var(--ink);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-brand {
    font-family: 'DM Serif Display', serif;
    color: var(--cream);
    font-size: 18px;
    padding: 14px 0;
    margin-right: auto;
    letter-spacing: 0.01em;
  }
  .nav-brand span { color: var(--accent-mid); }
  .nav-tab {
    color: var(--ink-muted);
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 18px 20px;
    cursor: pointer;
    transition: color 0.15s;
    border-bottom: 2px solid transparent;
  }
  .nav-tab:hover { color: var(--cream); }
  .nav-tab.active { color: var(--cream); border-bottom-color: var(--accent-mid); }

  /* SECTIONS */
  .section { display: none; padding: 2.5rem 2rem; max-width: 1100px; margin: 0 auto; }
  .section.active { display: block; }

  /* PAGE HEADER */
  .page-header { margin-bottom: 2rem; }
  .page-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 34px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .page-header p { color: var(--ink-muted); font-size: 14px; }

  /* WEEK LABEL */
  .week-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--parchment);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-soft);
    margin-bottom: 1.5rem;
    letter-spacing: 0.03em;
  }

  .mc { color: var(--blue); font-weight: 500; }
  .mf { color: var(--warm); font-weight: 500; }
  .mp { color: var(--accent); font-weight: 500; }
  .mc-hi { color: #C05621; font-weight: 500; }

  /* Plan — collapsible day blocks */
  .day-block { margin-bottom: 8px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .day-header {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 16px;
    background: var(--parchment);
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--border);
  }
  .day-header:hover { background: var(--border); }
  .day-block.collapsed .day-header { border-bottom: none; }
  .day-name-label { font-weight: 500; font-size: 14px; color: var(--ink); min-width: 36px; }
  .day-tag-pill {
    font-size: 11px; font-weight: 500; padding: 2px 9px;
    border-radius: 20px; letter-spacing: 0.03em;
  }
  .pill-prep { background: var(--blue-light); color: var(--blue); }
  .pill-leftovers { background: var(--parchment); color: var(--ink-muted); border: 1px solid var(--border); }
  .day-chevron { margin-left: auto; font-size: 12px; color: var(--ink-muted); transition: transform 0.2s; }
  .day-block.collapsed .day-chevron { transform: rotate(-90deg); }
  .day-meals { background: var(--white); }
  .day-block.collapsed .day-meals { display: none; }
  .meal-row {
    display: flex; align-items: center; gap: 0;
    border-bottom: 1px solid var(--parchment);
  }
  .meal-row:last-child { border-bottom: none; }
  .meal-type-col {
    width: 120px; flex-shrink: 0;
    padding: 12px 14px;
    font-size: 11px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--ink-muted);
    border-right: 1px solid var(--parchment);
  }
  .meal-name-col { flex: 1; padding: 12px 16px; font-size: 13px; font-weight: 500; color: var(--ink); }
  .meal-macro-col {
    width: 130px; flex-shrink: 0;
    padding: 12px 14px;
    border-left: 1px solid var(--parchment);
    font-size: 12px; line-height: 1.7;
  }
  @media (max-width: 540px) {
    .meal-type-col { width: 72px; font-size: 10px; padding: 10px 8px; }
    .meal-macro-col { width: 100px; padding: 10px 8px; font-size: 11px; }
    .meal-name-col { padding: 10px 10px; font-size: 12px; }
  }

  .leftover-dinner-row { background: var(--cream); }
  .leftover-dinner-label { color: var(--ink-muted); font-style: italic; font-weight: 400; }

  .recipes-section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .recipes-section-title { font-family: 'DM Serif Display', serif; font-size: 20px; font-weight: 400; color: var(--ink); }
  .fav-count { font-size: 12px; color: var(--ink-muted); background: var(--parchment); border: 1px solid var(--border); border-radius: 20px; padding: 2px 10px; }

  .recipe-card { position: relative; }
  .star-btn {
    position: absolute; top: 12px; right: 12px;
    width: 30px; height: 30px;
    background: var(--parchment);
    border: 1px solid var(--border);
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    z-index: 2;
    transition: background 0.15s, transform 0.1s;
    line-height: 1;
  }
  .star-btn:hover { background: var(--warm-light); transform: scale(1.1); }
  .star-btn.starred { background: var(--warm-light); border-color: var(--warm); }
  .fav-banner {
    font-size: 10px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--warm);
    padding: 4px 14px; background: var(--warm-light);
    border-bottom: 1px solid #EDCFB8;
  }

  /* ── GROCERY LIST ── */  .grocery-controls { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .grocery-controls button {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .btn-clear { background: var(--white); border: 1px solid var(--border); color: var(--ink-soft); }
  .btn-clear:hover { background: var(--parchment); }
  .btn-reset { background: var(--ink); border: 1px solid var(--ink); color: var(--cream); }
  .btn-reset:hover { background: var(--ink-soft); }
  .progress-wrap { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .progress-bar { width: 120px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s ease; }
  .progress-label { font-size: 12px; color: var(--ink-muted); min-width: 40px; }

  .grocery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .grocery-category {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .category-header {
    background: var(--parchment);
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .category-icon { font-size: 14px; }
  .category-count { margin-left: auto; font-size: 11px; color: var(--ink-muted); }

  .grocery-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 14px;
    border-bottom: 1px solid var(--parchment);
    cursor: pointer;
    transition: background 0.1s;
    user-select: none;
  }
  .grocery-item:last-child { border-bottom: none; }
  .grocery-item:hover { background: var(--cream); }
  .grocery-item.checked { opacity: 0.45; }
  .grocery-item.checked .item-name { text-decoration: line-through; }

  .item-check {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: var(--white);
  }
  .grocery-item.checked .item-check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .item-check-icon { display: none; color: white; font-size: 11px; font-weight: 700; }
  .grocery-item.checked .item-check-icon { display: block; }

  .item-name { font-size: 13px; color: var(--ink); flex: 1; }
  .item-amount { font-size: 12px; color: var(--ink-muted); white-space: nowrap; }

  /* ── RECIPES ── */
  .recipes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; margin-bottom: 2rem; }
  .recipe-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .recipe-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
  .recipe-card-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--parchment);
  }
  .recipe-tag { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; color: var(--accent); margin-bottom: 6px; }
  .recipe-card-name { font-family: 'DM Serif Display', serif; font-size: 17px; font-weight: 400; color: var(--ink); line-height: 1.3; margin-bottom: 6px; }
  .recipe-macros { display: flex; gap: 10px; }
  .recipe-macro { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
  .rm-c { background: var(--blue-light); color: var(--blue); }
  .rm-f { background: var(--warm-light); color: var(--warm); }
  .rm-p { background: var(--accent-light); color: var(--accent); }

  .recipe-card-body { padding: 12px 18px 14px; }
  .recipe-meta { display: flex; gap: 16px; margin-bottom: 10px; }
  .recipe-meta-item { font-size: 12px; color: var(--ink-muted); }
  .recipe-meta-item strong { color: var(--ink-soft); font-weight: 500; }
  .recipe-preview { font-size: 12px; color: var(--ink-soft); line-height: 1.5; }

  /* Recipe modal */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(28,26,22,0.6);
    z-index: 200;
    overflow-y: auto;
    padding: 2rem 1rem;
  }
  .modal-backdrop.open { display: flex; align-items: flex-start; justify-content: center; }
  .modal {
    background: var(--white);
    border-radius: 14px;
    width: 100%;
    max-width: 680px;
    overflow: hidden;
    position: relative;
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .modal-close {
    position: absolute;
    top: 14px; right: 14px;
    width: 32px; height: 32px;
    background: var(--parchment);
    border: 1px solid var(--border);
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    color: var(--ink-soft);
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    z-index: 10;
  }
  .modal-close:hover { background: var(--border); }
  .modal-header {
    padding: 24px 28px 18px;
    border-bottom: 1px solid var(--parchment);
    background: var(--cream);
  }
  .modal-tag { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; color: var(--accent); margin-bottom: 6px; }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; color: var(--ink); margin-bottom: 10px; line-height: 1.25; }
  .modal-macros { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .modal-macro { font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
  .modal-meta { display: flex; gap: 20px; flex-wrap: wrap; }
  .modal-meta-item { font-size: 13px; color: var(--ink-muted); }
  .modal-meta-item strong { color: var(--ink-soft); }
  .modal-body { padding: 22px 28px; }
  .modal-section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 500;
    color: var(--ink-muted);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--parchment);
  }
  .ingredients-list { list-style: none; margin-bottom: 22px; }
  .ingredients-list li {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
    border-bottom: 1px solid var(--parchment);
    font-size: 13px;
  }
  .ingredients-list li:last-child { border-bottom: none; }
  .ing-name { color: var(--ink); }
  .ing-amount { color: var(--ink-muted); font-size: 12px; }
  .steps-list { list-style: none; }
  .steps-list li {
    display: flex;
    gap: 14px;
    margin-bottom: 14px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--ink-soft);
  }
  .step-num {
    width: 24px;
    height: 24px;
    background: var(--ink);
    color: var(--cream);
    border-radius: 50%;
    font-size: 11px;
    font-weight: 500;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
  }

  .note-box {
    background: var(--accent-light);
    border-left: 3px solid var(--accent-mid);
    border-radius: 0 6px 6px 0;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--accent);
    margin-top: 16px;
    line-height: 1.5;
  }
  .portions-table { width: 100%; border-collapse: collapse; margin-bottom: 22px; }
  .portions-table tr { border-bottom: 1px solid var(--parchment); }
  .portions-table tr:last-child { border-bottom: none; }
  .portions-table td { padding: 7px 0; font-size: 13px; vertical-align: top; }
  .pt-component { color: var(--ink); width: 46%; }
  .pt-weight { font-weight: 500; color: var(--ink); width: 18%; white-space: nowrap; }
  .pt-note { color: var(--ink-muted); font-size: 12px; width: 36%; }

  /* responsive */
  @media (max-width: 640px) {
    nav { padding: 0 1rem; }
    .section { padding: 1.5rem 1rem; }
    .nav-brand { font-size: 15px; }
    .nav-tab { padding: 16px 12px; font-size: 11px; }
    .page-header h1 { font-size: 26px; }
    .plan-table { font-size: 12px; }
    .plan-table th, .plan-table td { padding: 9px 10px; }
    .modal-header, .modal-body { padding: 18px; }
    .modal-title { font-size: 20px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">Weekly <span>Meal Plan</span></div>
  <button class="nav-tab active" onclick="showTab('plan')">Plan</button>
  <button class="nav-tab" onclick="showTab('grocery')">Grocery</button>
  <button class="nav-tab" onclick="showTab('recipes')">Recipes</button>
</nav>

<!-- ═══════════════════════════════════ MEAL PLAN ═══════════════════════════════════ -->
<div id="tab-plan" class="section active">
  <div class="page-header">
    <h1>This week's meals</h1>
    <p>2 meals per day · 8 portions each · No mango</p>
  </div>

  <div class="week-label">Week of — update me each week</div>

  <div id="plan-days"></div>
</div>

<!-- ═══════════════════════════════════ GROCERY ═══════════════════════════════════ -->
<div id="tab-grocery" class="section">
  <div class="page-header">
    <h1>Grocery list</h1>
    <p>Everything you need for the week · tap to check off</p>
  </div>

  <div class="grocery-controls">
    <button class="btn-clear" onclick="clearAll()">Uncheck all</button>
    <button class="btn-reset" onclick="resetAll()">Reset list</button>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">0%</div>
    </div>
  </div>

  <div class="grocery-grid" id="grocery-grid"></div>
</div>

<!-- ═══════════════════════════════════ RECIPES ═══════════════════════════════════ -->
<div id="tab-recipes" class="section">
  <div class="page-header">
    <h1>Recipes</h1>
    <p>Click any card to open · star to save to favorites</p>
  </div>

  <div class="recipes-section-header">
    <span class="recipes-section-title">This week</span>
  </div>
  <div class="recipes-grid" id="recipes-grid"></div>

  <div class="recipes-section-header" id="fav-section-header" style="display:none; margin-top:2rem;">
    <span class="recipes-section-title">Saved favorites</span>
    <span class="fav-count" id="fav-count"></span>
  </div>
  <div class="recipes-grid" id="favorites-grid"></div>
</div>

<!-- RECIPE MODAL -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// ── TAB SWITCHING ──
function showTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  event.target.classList.add('active');
}

// ── PLAN DATA ──
const planDays = [
  {
    day: 'Mon', tag: null,
    meals: [
      { type: 'Lunch', name: 'Lemon herb chicken & farro bowls', c:28, f:10, p:42 },
      { type: 'Dinner', name: 'Sheet pan turkey meatballs & roasted broccoli', c:25, f:11, p:44 },
    ]
  },
  {
    day: 'Tue', tag: null,
    meals: [
      { type: 'Lunch', name: 'Lemon herb chicken & farro bowls', c:28, f:10, p:42 },
      { type: 'Dinner', name: 'Baked salmon & steamed asparagus', c:22, f:12, p:46 },
    ]
  },
  {
    day: 'Wed', tag: null,
    meals: [
      { type: 'Lunch', name: 'Lemon herb chicken & farro bowls', c:28, f:10, p:42 },
      { type: 'Dinner', name: 'Baked salmon & asparagus', c:22, f:12, p:46 },
    ]
  },
  {
    day: 'Thu', tag: 'leftovers', leftoverDinner: true,
    meals: [
      { type: 'Lunch', name: 'Lemon herb chicken & farro bowls', c:28, f:10, p:42 },
    ]
  },
  {
    day: 'Fri', tag: null,
    meals: [
      { type: 'Lunch', name: 'Tuna & white bean lettuce wraps', c:20, f:10, p:40 },
      { type: 'Dinner', name: 'Lean beef stir fry & Homai calrose rice', c:38, f:12, p:44 },
    ]
  },
  {
    day: 'Sat', tag: null,
    meals: [
      { type: 'Lunch', name: 'Tuna & white bean lettuce wraps', c:20, f:10, p:40 },
      { type: 'Dinner', name: 'Lean beef stir fry & Homai calrose rice', c:38, f:12, p:44 },
    ]
  },
  {
    day: 'Sun', tag: 'prep + leftovers', leftoverDinner: true,
    meals: [
      { type: 'Lunch', name: 'Tuna & white bean lettuce wraps', c:20, f:10, p:40 },
    ]
  },
];

const collapsed = {};

function buildPlan() {
  const container = document.getElementById('plan-days');
  container.innerHTML = '';
  planDays.forEach((d, i) => {
    const isCollapsed = collapsed[i] || false;
    const tagHtml = d.tag
      ? `<span class="day-tag-pill ${d.tag.includes('prep') ? 'pill-prep' : 'pill-leftovers'}">${d.tag}</span>`
      : '';
    const leftoverRow = d.leftoverDinner ? `
      <div class="meal-row leftover-dinner-row">
        <div class="meal-type-col">Dinner</div>
        <div class="meal-name-col leftover-dinner-label">Leftovers</div>
        <div class="meal-macro-col" style="color:var(--ink-muted);font-size:12px;">—</div>
      </div>` : '';
    const mealsHtml = d.meals.map(m => `
      <div class="meal-row">
        <div class="meal-type-col">${m.type}</div>
        <div class="meal-name-col">${m.name}</div>
        <div class="meal-macro-col">
          <span class="mc">${m.c}g C</span><br>
          <span class="mf">${m.f}g F</span><br>
          <span class="mp">${m.p}g P</span>
        </div>
      </div>`).join('');
    const block = document.createElement('div');
    block.className = 'day-block' + (isCollapsed ? ' collapsed' : '');
    block.innerHTML = `
      <div class="day-header" onclick="toggleDay(${i})">
        <span class="day-name-label">${d.day}</span>
        ${tagHtml}
        <span class="day-chevron">▾</span>
      </div>
      <div class="day-meals">${mealsHtml}${leftoverRow}</div>`;
    container.appendChild(block);
  });
}

function toggleDay(i) {
  collapsed[i] = !collapsed[i];
  buildPlan();
}

buildPlan();

// ── GROCERY DATA ──

let checked = {};

function buildGrocery() {
  const grid = document.getElementById('grocery-grid');
  grid.innerHTML = '';
  let total = 0, done = 0;
  groceryData.forEach((cat, ci) => {
    const card = document.createElement('div');
    card.className = 'grocery-category';
    const items = cat.items.map((item, ii) => {
      const key = ci + '-' + ii;
      total++;
      if (checked[key]) done++;
      const isChecked = checked[key] ? 'checked' : '';
      return `<div class="grocery-item ${isChecked}" onclick="toggleItem('${key}', this)">
        <div class="item-check"><span class="item-check-icon">✓</span></div>
        <div class="item-name">${item.name}</div>
        <div class="item-amount">${item.amount}</div>
      </div>`;
    }).join('');
    card.innerHTML = `
      <div class="category-header">
        <span class="category-icon" style="font-size:14px">${cat.icon}</span>
        ${cat.category}
        <span class="category-count">${cat.items.length} items</span>
      </div>
      ${items}
    `;
    grid.appendChild(card);
  });
  updateProgress(done, total);
}

function toggleItem(key, el) {
  checked[key] = !checked[key];
  el.classList.toggle('checked', checked[key]);
  el.querySelector('.item-check-icon').style.display = checked[key] ? 'block' : 'none';
  let total = 0, done = 0;
  groceryData.forEach((cat, ci) => cat.items.forEach((_, ii) => {
    total++;
    if (checked[ci+'-'+ii]) done++;
  }));
  updateProgress(done, total);
}

function updateProgress(done, total) {
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = pct + '%';
}

function clearAll() {
  checked = {};
  buildGrocery();
}

function resetAll() {
  checked = {};
  buildGrocery();
}

buildGrocery();

// ── FAVORITES ──
// Stored as a Set of recipe indices from the main `recipes` array.
// favBank holds additional saved recipes not in current week's list.
const starred = new Set();

// favBank: array of recipe objects saved from previous weeks.
// Add entries here to persist favorites across weekly updates.
const favBank = [
  // Example (uncomment and fill to add a banked recipe):
  // { tag: 'Previous week', name: 'Example saved recipe', macros:{c:25,f:10,p:40}, serves:8, time:'30 min', difficulty:'Easy', preview:'A favorite from a past week.', portions:[], ingredients:[], steps:[], note:'' },
];

function buildRecipes() {
  renderRecipeGrid(document.getElementById('recipes-grid'), recipes, 'main');
  renderFavorites();
}

function renderRecipeGrid(grid, list, source) {
  grid.innerHTML = '';
  list.forEach((r, i) => {
    const idx = source === 'main' ? i : 'bank-' + i;
    const isStarred = starred.has(String(idx));
    const card = document.createElement('div');
    card.className = 'recipe-card';
    card.innerHTML = `
      <button class="star-btn ${isStarred ? 'starred' : ''}" onclick="toggleStar(event, '${idx}')" title="${isStarred ? 'Remove from favorites' : 'Save to favorites'}">${isStarred ? '★' : '☆'}</button>
      <div class="recipe-card-header">
        <div class="recipe-tag">${r.tag}</div>
        <div class="recipe-card-name">${r.name}</div>
        <div class="recipe-macros">
          <span class="recipe-macro rm-c">${r.macros.c}g C</span>
          <span class="recipe-macro rm-f">${r.macros.f}g F</span>
          <span class="recipe-macro rm-p">${r.macros.p}g P</span>
        </div>
      </div>
      <div class="recipe-card-body">
        <div class="recipe-meta">
          <div class="recipe-meta-item"><strong>Serves</strong> ${r.serves}</div>
          <div class="recipe-meta-item"><strong>Time</strong> ${r.time}</div>
          <div class="recipe-meta-item"><strong>Difficulty</strong> ${r.difficulty}</div>
        </div>
        <div class="recipe-preview">${r.preview}</div>
      </div>
    `;
    card.querySelector('.recipe-card-header').onclick = () => openRecipe(r);
    card.querySelector('.recipe-card-body').onclick = () => openRecipe(r);
    grid.appendChild(card);
  });
}

function renderFavorites() {
  const favGrid = document.getElementById('favorites-grid');
  const header = document.getElementById('fav-section-header');
  const countEl = document.getElementById('fav-count');

  // Collect starred from main recipes
  const starredRecipes = [];
  starred.forEach(idx => {
    if (String(idx).startsWith('bank-')) {
      const bi = parseInt(idx.replace('bank-', ''));
      if (favBank[bi]) starredRecipes.push({ r: favBank[bi], idx });
    } else {
      const i = parseInt(idx);
      if (recipes[i]) starredRecipes.push({ r: recipes[i], idx });
    }
  });

  // Also always show favBank items
  const bankItems = favBank.map((r, i) => ({ r, idx: 'bank-' + i }));

  // Combine: starred current week recipes + all banked recipes (deduplicated)
  const allFavs = [...starredRecipes.filter(f => !String(f.idx).startsWith('bank-')), ...bankItems];

  if (allFavs.length === 0) {
    header.style.display = 'none';
    favGrid.innerHTML = '';
    return;
  }

  header.style.display = 'flex';
  countEl.textContent = allFavs.length + ' saved';
  favGrid.innerHTML = '';
  allFavs.forEach(({ r, idx }) => {
    const isStarred = starred.has(String(idx));
    const card = document.createElement('div');
    card.className = 'recipe-card';
    card.innerHTML = `
      ${String(idx).startsWith('bank-') ? '<div class="fav-banner">Saved recipe</div>' : ''}
      <button class="star-btn ${isStarred ? 'starred' : ''}" onclick="toggleStar(event, '${idx}')" title="${isStarred ? 'Remove from favorites' : 'Save to favorites'}">${isStarred ? '★' : '☆'}</button>
      <div class="recipe-card-header">
        <div class="recipe-tag">${r.tag}</div>
        <div class="recipe-card-name">${r.name}</div>
        <div class="recipe-macros">
          <span class="recipe-macro rm-c">${r.macros.c}g C</span>
          <span class="recipe-macro rm-f">${r.macros.f}g F</span>
          <span class="recipe-macro rm-p">${r.macros.p}g P</span>
        </div>
      </div>
      <div class="recipe-card-body">
        <div class="recipe-meta">
          <div class="recipe-meta-item"><strong>Serves</strong> ${r.serves}</div>
          <div class="recipe-meta-item"><strong>Time</strong> ${r.time}</div>
          <div class="recipe-meta-item"><strong>Difficulty</strong> ${r.difficulty}</div>
        </div>
        <div class="recipe-preview">${r.preview}</div>
      </div>
    `;
    card.querySelector('.recipe-card-header').onclick = () => openRecipe(r);
    card.querySelector('.recipe-card-body').onclick = () => openRecipe(r);
    favGrid.appendChild(card);
  });
}

function toggleStar(e, idx) {
  e.stopPropagation();
  if (starred.has(String(idx))) {
    starred.delete(String(idx));
  } else {
    starred.add(String(idx));
  }
  buildRecipes();
}

function openRecipe(r) {
  const content = document.getElementById('modal-content');
  content.innerHTML = `
    <button class="modal-close" onclick="document.getElementById('modal-backdrop').classList.remove('open')">×</button>
    <div class="modal-header">
      <div class="modal-tag">${r.tag}</div>
      <div class="modal-title">${r.name}</div>
      <div class="modal-macros">
        <span class="modal-macro rm-c">${r.macros.c}g carbs</span>
        <span class="modal-macro rm-f">${r.macros.f}g fat</span>
        <span class="modal-macro rm-p">${r.macros.p}g protein</span>
      </div>
      <div class="modal-meta">
        <div class="modal-meta-item"><strong>Serves:</strong> ${r.serves}</div>
        <div class="modal-meta-item"><strong>Time:</strong> ${r.time}</div>
        <div class="modal-meta-item"><strong>Difficulty:</strong> ${r.difficulty}</div>
      </div>
    </div>
    <div class="modal-body">
      ${r.portions && r.portions.length ? `
      <div class="modal-section-title">Per portion — cooked weights (adults)</div>
      <table class="portions-table">
        ${r.portions.map(p => `<tr>
          <td class="pt-component">${p.component}</td>
          <td class="pt-weight">${p.weight}</td>
          <td class="pt-note">${p.note}</td>
        </tr>`).join('')}
      </table>` : ''}
      <div class="modal-section-title">Ingredients</div>
      <ul class="ingredients-list">
        ${r.ingredients.map(ing => `<li><span class="ing-name">${ing.name}</span><span class="ing-amount">${ing.amount}</span></li>`).join('')}
      </ul>
      <div class="modal-section-title">Instructions</div>
      <ol class="steps-list">
        ${r.steps.map((s, n) => `<li><div class="step-num">${n+1}</div><div>${s}</div></li>`).join('')}
      </ol>
      ${r.note ? `<div class="note-box">${r.note}</div>` : ''}
    </div>
  `;
  document.getElementById('modal-backdrop').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-backdrop')) {
    document.getElementById('modal-backdrop').classList.remove('open');
  }
}

buildRecipes();
</script>
</body>
</html>
